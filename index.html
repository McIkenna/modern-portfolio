    <script>
      const savedTheme = localStorage.getItem("theme");
      const theme = savedTheme === "dark" || savedTheme === "light" ? savedTheme : "light";
      document.documentElement.dataset.theme = theme;
      document.documentElement.style.colorScheme = theme;
    </script>
